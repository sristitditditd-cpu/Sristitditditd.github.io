<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O-NEXUS | ARCHON COMMAND</title>
    <style>
        body { background: #000; color: #00ff41; font-family: 'Courier New', monospace; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .header { border-bottom: 2px double #00ff41; width: 100%; text-align: center; padding: 10px 0; margin-bottom: 20px; text-shadow: 0 0 10px #00ff41; }
        .terminal { border: 1px solid #00ff41; width: 90%; max-width: 600px; padding: 20px; background: rgba(0, 20, 0, 0.8); box-shadow: inset 0 0 10px #00ff41; }
        .status-bar { display: flex; justify-content: space-between; font-size: 0.8em; color: #ffeb3b; margin-bottom: 15px; border-bottom: 1px dashed #00ff41; padding-bottom: 5px; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .btn { border: 1px solid #00ff41; padding: 10px; text-align: center; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .btn:hover { background: #00ff41; color: #000; box-shadow: 0 0 20px #00ff41; }
        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div class="header">
        <h1>O-NEXUS : نظام السيادة</h1>
    </div>

    <div class="terminal">
        <div class="status-bar">
            <span>المستخدم: ARCHON</span>
            <span class="blink">الحالة: متصل بالوقود ⚡</span>
        </div>
        
        <p>> النظام مستقر.. بانتظار أوامر "سيف" لكسر المستحيل.</p>
        
        <div class="btn-grid">
            <div class="btn" onclick="alert('جاري تشفير الملفات الوزارية...')">خزانة العلم</div>
            <div class="btn" onclick="alert('خطة سداد الديون: تافهة أمامك!')">الكرامة المالية</div>
            <div class="btn" onclick="alert('كشف الثغرات الخمس: قيد البرمجة...')">سلاح الأركون</div>
            <div class="btn" onclick="alert('مذكرات المحارب: سرية للغاية')">خندق الأسرار</div>
        </div>
    </div>

    <p style="margin-top: 20px; font-size: 0.7em; color: #555;">UNITY PROTOCOL | 2026</p>
</body>
</html>
